        type="image/webp"
        media="(max-width: 767px)"
        srcset="/assets/selections-layered-material-palette-mobile-900.webp 900w"
        sizes="100vw">
      <source
        type="image/webp"
        srcset="/assets/selections-layered-material-palette-hero-800.webp 800w,

                /assets/selections-layered-material-palette-hero-1600.webp 1600w"

        src="/assets/selections-layered-material-palette-hero-1200.jpg"

        height="900">
